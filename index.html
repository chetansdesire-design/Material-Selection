<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URBAN CASA</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --vibrant-blue: #0061ff;
            --soft-bg: #f8fafc;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --border-color: #e2e8f0;
            --accent-gradient: linear-gradient(135deg, #0061ff 0%, #60efff 100%);
        }
        body { background-color: var(--soft-bg); color: var(--text-dark); font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; padding: 20px; font-size: 0.8rem; }
        .container { max-width: 1400px; margin: auto; }
        .header-card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.03); display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border: 1px solid var(--border-color); }
        h2 { margin: 0; font-size: 1.2rem; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .order-section, .notes-section { background: var(--white); border-radius: 20px; padding: 20px; margin-bottom: 30px; border: 1px solid var(--border-color); }
        .section-title { font-size: 0.9rem; font-weight: 800; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ""; width: 4px; height: 16px; background: var(--accent-gradient); border-radius: 10px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 5px; }
        th { text-align: left; font-size: 0.7rem; color: var(--text-light); padding: 10px; text-transform: uppercase; }
        td { background: var(--soft-bg); padding: 8px 10px; border: 1px solid var(--border-color); }
        
        input, textarea { text-transform: capitalize; }
        input { background: transparent; border: 1px solid transparent; width: 90%; font-family: inherit; font-size: 0.8rem; font-weight: 600; outline: none; }
        input::placeholder, textarea::placeholder { font-size: 0.6rem; opacity: 0.5; color: var(--text-light); }
        
        .icon-btn { background: none; border: 1px solid var(--border-color); padding: 8px; border-radius: 8px; cursor: pointer; }
        .add-btn { background: var(--white); color: var(--vibrant-blue); border: 1px solid var(--vibrant-blue); padding: 5px 15px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; cursor: pointer; margin-top: 10px; }
        
        /* New Styles for Row Action Buttons */
        .action-cell { white-space: nowrap; width: 80px; text-align: center; }
        .row-action-btn { background: var(--white); border: 1px solid var(--border-color); color: var(--text-light); border-radius: 4px; padding: 4px 6px; cursor: pointer; font-size: 0.7rem; transition: all 0.2s; margin: 0 2px; }
        .row-action-btn:hover { background: var(--vibrant-blue); color: var(--white); border-color: var(--vibrant-blue); }
        .del-btn:hover { background: #ef4444; border-color: #ef4444; color: white; }

        .img-preview { 
            width: 60px; 
            height: 45px; 
            background: #e2e8f0; 
            border-radius: 4px; 
            object-fit: cover; 
            display: none; 
            margin-top: 5px; 
            cursor: pointer; 
            border: 1px solid var(--border-color);
        }
        
        .upload-btn { font-size: 0.65rem; font-weight: 700; color: var(--vibrant-blue); cursor: pointer; text-transform: uppercase; }
        textarea { width: 100%; height: 80px; border: 1px solid var(--border-color); border-radius: 10px; padding: 10px; font-family: inherit; resize: none; box-sizing: border-box; }
        
        .signature-section { display: flex; justify-content: space-between; margin-top: 40px; padding: 20px; }
        .sig-box { border-top: 2px solid var(--text-dark); width: 200px; text-align: center; padding-top: 10px; font-size: 0.8rem; font-weight: 600; }
        .print-fab { position: fixed; bottom: 30px; right: 30px; background: var(--vibrant-blue); color: white; width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0, 97, 255, 0.4); cursor: pointer; font-size: 20px; z-index: 1000; }
        .toast { background: var(--text-dark); color: white; padding: 12px 20px; border-radius: 10px; margin-bottom: 10px; font-size: 0.8rem; animation: fadeIn 0.3s, fadeOut 0.3s 2.5s; }
        
        .modal { display: none; position: fixed; z-index: 3000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { margin: 5% auto; display: block; max-width: 90%; max-height: 80vh; border-radius: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.5); animation: zoomIn 0.3s ease; }
        .close-modal { position: absolute; top: 20px; right: 35px; color: #ffffff; font-size: 40px; font-weight: bold; cursor: pointer; transition: color 0.2s; }
        .close-modal:hover { color: var(--vibrant-blue); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @media print { .add-btn, .upload-btn, .print-fab, .icon-btn, .action-cell, th:last-child { display: none !important; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header-card">
        <h2>Urban Casa</h2>
        <input type="text" id="project-name" placeholder="Client Name / Project Id" style="width: 300px; font-size: 1rem;">
        <div style="display: flex; gap: 10px;">
            <button onclick="saveToCloud()" class="icon-btn" title="Save to Drive">💾</button>
            <button onclick="loadFromCloud()" class="icon-btn" title="Search Drive">🔍</button>
        </div>
    </div>

    <div class="order-section">
        <div class="section-title">Laminate Specifications</div>
        <table id="lam-table">
            <thead><tr><th>Location</th><th>Unit</th><th>Type</th><th>Brand</th><th>Code</th><th>Qty</th><th>Pic</th><th>Action</th></tr></thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Ground Floor-Kitchen"></td>
                    <td><input type="text" placeholder="Base Unit"></td>
                    <td><input type="text" placeholder="Inner / Outer"></td>
                    <td><input type="text" placeholder="Green Laminate"></td>
                    <td><input type="text" placeholder="Sm-1234"></td>
                    <td><input type="text" placeholder="0"></td>
                    <td><img class="img-preview"><label class="upload-btn">Upload<input type="file" onchange="previewFile(this)" style="display:none"></label></td>
                    <td class="action-cell">
                        <button class="row-action-btn" onclick="moveRowUp(this)" title="Move Up">↑</button>
                        <button class="row-action-btn" onclick="moveRowDown(this)" title="Move Down">↓</button>
                        <button class="row-action-btn del-btn" onclick="deleteRow(this)" title="Delete Row">✖</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="add-btn" onclick="addRow('lam-table')">+ Add New</button>
    </div>

    <div class="order-section">
        <div class="section-title">Edge Banding Details</div>
        <table id="eb-table">
            <thead><tr><th>Location</th><th>Unit</th><th>Type</th><th>Brand</th><th>Code</th><th>Size</th><th>Qty</th><th>Pic</th><th>Action</th></tr></thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Ground Floor-Kitchen"></td>
                    <td><input type="text" placeholder="Base Unit"></td>
                    <td><input type="text" placeholder="Inner / Outer"></td>
                    <td><input type="text" placeholder="Green Laminate"></td>
                    <td><input type="text" placeholder="Sm-1234"></td>
                    <td><input type="text" placeholder="2.0mm"></td>
                    <td><input type="text" placeholder="0"></td>
                    <td><img class="img-preview"><label class="upload-btn">Upload<input type="file" onchange="previewFile(this)" style="display:none"></label></td>
                    <td class="action-cell">
                        <button class="row-action-btn" onclick="moveRowUp(this)" title="Move Up">↑</button>
                        <button class="row-action-btn" onclick="moveRowDown(this)" title="Move Down">↓</button>
                        <button class="row-action-btn del-btn" onclick="deleteRow(this)" title="Delete Row">✖</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="add-btn" onclick="addRow('eb-table')">+ Add New</button>
    </div>

    <div class="order-section">
        <div class="section-title">Profile Handles & Glass</div>
        <table id="glass-table">
            <thead><tr><th>Location</th><th>Unit</th><th>Item</th><th>Brand</th><th>Code / Finish</th><th>Qty</th><th>Pic</th><th>Action</th></tr></thead>
            <tbody>
                <tr>
                    <td><input type="text" placeholder="Ground Floor-Kitchen"></td>
                    <td><input type="text" placeholder="Base Unit"></td>
                    <td><input type="text" placeholder="Profile/Glass"></td>
                    <td><input type="text" placeholder="Brand"></td>
                    <td><input type="text" placeholder="Matte Black"></td>
                    <td><input type="text" placeholder="0"></td>
                    <td><img class="img-preview"><label class="upload-btn">Upload<input type="file" onchange="previewFile(this)" style="display:none"></label></td>
                    <td class="action-cell">
                        <button class="row-action-btn" onclick="moveRowUp(this)" title="Move Up">↑</button>
                        <button class="row-action-btn" onclick="moveRowDown(this)" title="Move Down">↓</button>
                        <button class="row-action-btn del-btn" onclick="deleteRow(this)" title="Delete Row">✖</button>
                    </td>
                </tr>
            </tbody>
        </table>
        <button class="add-btn" onclick="addRow('glass-table')">+ Add New</button>
    </div>

    <div class="notes-section">
        <div class="section-title">Notes / Remarks</div>
        <textarea id="project-notes" placeholder="Add Special Instructions Here..."></textarea>
    </div>

    <div class="signature-section">
        <div class="sig-box">Client Signature</div>
        <div class="sig-box">Manager Signature</div>
    </div>
</div>

<div id="toast-container" style="position: fixed; bottom: 20px; left: 20px; z-index: 2000;"></div>
<div class="print-fab" onclick="window.print()" title="Print">🖨️</div>

<div id="image-modal" class="modal" onclick="closeModal()">
    <span class="close-modal">&times;</span>
    <img class="modal-content" id="modal-img">
</div>

<script>
    // --- UI FUNCTIONS ---
    function openModal(imgSrc) {
        const modal = document.getElementById("image-modal");
        document.getElementById("modal-img").src = imgSrc;
        modal.style.display = "block";
    }

    function closeModal() {
        document.getElementById("image-modal").style.display = "none";
    }

    function previewFile(input) {
        const file = input.files[0];
        const preview = input.closest('td').querySelector('.img-preview');
        if (file) {
            const reader = new FileReader();
            reader.onloadend = function () { 
                preview.src = reader.result; 
                preview.style.display = "block"; 
                preview.onclick = function(e) { 
                    e.stopPropagation(); 
                    openModal(this.src); 
                };
            }
            reader.readAsDataURL(file);
        }
    }

    function showToast(msg) {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div'); 
        toast.className = 'toast'; 
        toast.innerText = msg;
        container.appendChild(toast); 
        setTimeout(() => toast.remove(), 3000);
    }

    // --- ROW CONTROLS ---
    function addRow(tableId) {
        const table = document.getElementById(tableId).getElementsByTagName('tbody')[0];
        const newRow = table.rows[0].cloneNode(true);
        newRow.querySelectorAll('input[type="text"]').forEach(i => i.value = "");
        newRow.querySelector('.img-preview').style.display = "none";
        newRow.querySelector('.img-preview').src = "";
        table.appendChild(newRow);
    }

    function moveRowUp(btn) {
        const row = btn.closest('tr');
        const prevRow = row.previousElementSibling;
        if (prevRow) {
            row.parentNode.insertBefore(row, prevRow);
        }
    }

    function moveRowDown(btn) {
        const row = btn.closest('tr');
        const nextRow = row.nextElementSibling;
        if (nextRow) {
            row.parentNode.insertBefore(nextRow, row);
        }
    }

    function deleteRow(btn) {
        const row = btn.closest('tr');
        const tbody = row.parentNode;
        // Check if it's the last row. If so, just clear it so we don't break the 'Add New' feature
        if (tbody.querySelectorAll('tr').length > 1) {
            row.remove();
        } else {
            row.querySelectorAll('input[type="text"]').forEach(i => i.value = "");
            row.querySelector('.img-preview').style.display = "none";
            row.querySelector('.img-preview').src = "";
            showToast("🧹 Row cleared (cannot delete the last row).");
        }
    }

    // --- DATA FUNCTIONS ---
    function getTableData(id) { 
        return Array.from(document.querySelectorAll(`#${id} tbody tr`)).map(r => {
            const inputs = Array.from(r.querySelectorAll('input[type="text"]')).map(i => i.value);
            const img = r.querySelector('.img-preview');
            const imgSrc = (img && img.style.display !== "none") ? img.src : "";
            return { inputs: inputs, imgSrc: imgSrc };
        }); 
    }

    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwFEgdzxL4Hkbp8H6drBzjaNHnEJ0QQkliwsqLUTGNHzQu7i9m0iLhh_ITUmQXO7RRgtQ/exec";

    // --- SAVE TO CLOUD ---
    async function saveToCloud() {
        const projectId = document.getElementById('project-name').value;
        if (!projectId) return showToast("⚠️ Enter Project Id");

        showToast("⏳ Saving to Drive...");

        const notes = document.getElementById('project-notes').value;
        const lamData = getTableData('lam-table');
        const ebData = getTableData('eb-table');
        const glassData = getTableData('glass-table');

        let firstImage = "";
        if (lamData.length > 0 && lamData[0].imgSrc) {
            firstImage = lamData[0].imgSrc;
        }

        const payload = {
            projectId: projectId,
            notes: notes,
            lam: lamData,
            eb: ebData,
            glass: glassData,
            imgData: firstImage
        };

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'text/plain' }, 
                body: JSON.stringify(payload)
            });
            showToast("✅ Project Saved to Drive!");
        } catch (error) {
            showToast("❌ Network error. Check console.");
            console.error(error);
        }
    }

    // --- LOAD FROM CLOUD ---
    async function loadFromCloud() {
        const name = prompt("Enter Project Id To Load:");
        if (!name) return;

        showToast("🔍 Searching Database...");

        try {
            const response = await fetch(`${GOOGLE_SCRIPT_URL}?projectId=${encodeURIComponent(name)}`);
            const result = await response.json();

            if (result.status === "success") {
                document.getElementById('project-notes').value = result.notes || "";
                document.getElementById('project-name').value = name;

                ['lam-table', 'eb-table', 'glass-table'].forEach((id, idx) => {
                    const body = document.querySelector(`#${id} tbody`);
                    const key = ['lam', 'eb', 'glass'][idx];
                    const tableData = result[key];

                    const templateRow = body.rows[0].cloneNode(true);
                    templateRow.querySelectorAll('input[type="text"]').forEach(i => i.value = "");
                    const templateImg = templateRow.querySelector('.img-preview');
                    templateImg.style.display = "none";
                    templateImg.src = "";

                    body.innerHTML = "";

                    if (tableData && tableData.length > 0) {
                        tableData.forEach(rowData => {
                            const newRow = templateRow.cloneNode(true);
                            const inputs = newRow.querySelectorAll('input[type="text"]');

                            if (rowData.inputs) {
                                rowData.inputs.forEach((v, i) => { if(inputs[i]) inputs[i].value = v; });
                            }

                            if (rowData.imgSrc) {
                                const img = newRow.querySelector('.img-preview');
                                img.src = rowData.imgSrc;
                                img.style.display = "block";
                                img.onclick = function(e) {
                                    e.stopPropagation();
                                    openModal(this.src);
                                };
                            }
                            body.appendChild(newRow);
                        });
                    } else {
                        body.appendChild(templateRow);
                    }
                });
                showToast("📂 Project Loaded!");
            } else if (result.status === "not_found") {
                showToast("❌ Project Not Found.");
            } else {
                showToast("❌ Error loading project.");
                console.error(result.message);
            }
        } catch (error) {
            showToast("❌ Network error. Check console.");
            console.error(error);
        }
    }
</script>
</body>
</html>
